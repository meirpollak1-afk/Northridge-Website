name: Update Rate Data

# Runs every 6 hours and can also be triggered manually
on:
  schedule:
    - cron: '0 0,6,12,18 * * *'   # 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:                # manual "Run workflow" button in GitHub UI

jobs:
  update-rates:
    runs-on: ubuntu-latest
    permissions:
      contents: write               # needed to push the updated rates.json

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          # No pip packages needed — script uses only stdlib (json, urllib)

      - name: Fetch rates from FRED and write rates.json
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/update_rates.py

      - name: Commit and push rates.json if it changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only rates.json — nothing else changes
          git add rates.json

          # Only commit if rates.json actually changed
          if git diff --cached --quiet; then
            echo "rates.json unchanged — no commit needed"
          else
            git commit -m "chore: update rates.json [skip ci]"
            git push
          fi
